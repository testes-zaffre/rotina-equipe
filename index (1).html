<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarefas</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px}
.task{padding:8px;border-bottom:1px solid #ddd}
</style>

</head>

<body>

<div class="box">
<h2>Tarefas de Hoje</h2>

<input id="taskInput" placeholder="Nova tarefa">
<button onclick="addTask()">Adicionar</button>

<div id="list"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

function addTask(){
  const val = document.getElementById("taskInput").value;
  if(!val) return;

  tasks.push(val);
  localStorage.setItem("tasks", JSON.stringify(tasks));

  document.getElementById("taskInput").value="";
  render();
}

function render(){
  document.getElementById("list").innerHTML =
    tasks.map(t=>`<div class="task">${t}</div>`).join('');
}

render();
</script>

</body>
</html>
