<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Equipe</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px}
.task{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<div id="auth" class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">

<div style="display:flex; gap:5px;">
<input type="password" id="pass" placeholder="Senha">
<button onclick="togglePassword()">👁️</button>
</div>

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>

<div id="err"></div>
</div>

<div id="app" class="box" style="display:none">

<h3 id="user"></h3>

<h4>Hoje</h4>
<div id="today"></div>

<h4>Amanhã</h4>
<div id="tomorrow"></div>

<input id="taskInput" placeholder="Nova tarefa">
<button onclick="addToday()">Adicionar hoje</button>
<button onclick="addTomorrow()">Adicionar amanhã</button>

<button onclick="logout()">Sair</button>

</div>

<script>
const sb = supabase.createClient(
'https://awnmxrxkhxepryixhurd.supabase.co',
'SUA_KEY_AQUI'
);

let me = null;

/* 👁️ */
function togglePassword(){
  pass.type = pass.type === "password" ? "text" : "password";
}

/* HASH */
async function hash(p){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* LOGIN */
async function login(){
  const h = await hash(pass.value);

  const {data} = await sb.from('profiles')
    .select('*')
    .eq('email', email.value)
    .eq('pass_hash', h)
    .single();

  if(!data){
    err.innerText = "Erro login";
    return;
  }

  me = data;
  start();
}

/* REGISTER */
async function register(){
  await sb.from('profiles').insert({
    id: crypto.randomUUID(),
    email: email.value,
    pass_hash: await hash(pass.value),
    name: email.value
  });

  alert("Conta criada!");
}

/* START */
function start(){
  auth.style.display="none";
  app.style.display="block";
  user.innerText = me.email;
  load();
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* DATA */
function today(){
  return new Date().toISOString().split('T')[0];
}

function tomorrow(){
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

/* LOAD */
async function load(){
  const {data} = await sb.from('tasks').select('*');

  const tdy = data.filter(t=>t.date===today());
  const tmr = data.filter(t=>t.date===tomorrow());

  today.innerHTML = tdy.map(t=>`<div class="task">${t.title}</div>`).join('');
  tomorrow.innerHTML = tmr.map(t=>`<div class="task">${t.title}</div>`).join('');
}

/* ADD */
async function addToday(){
  await sb.from('tasks').insert({
    title: taskInput.value,
    date: today()
  });
  taskInput.value="";
  load();
}

async function addTomorrow(){
  await sb.from('tasks').insert({
    title: taskInput.value,
    date: tomorrow()
  });
  taskInput.value="";
  load();
}
</script>

</body>
</html>
