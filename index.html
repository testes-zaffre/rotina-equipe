<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Equipe</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px;cursor:pointer}
.task{padding:8px;border-bottom:1px solid #ddd}
.err{color:red;font-size:13px}
</style>
</head>

<body>

<div id="auth" class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">

<div style="display:flex; gap:5px;">
<input type="password" id="pass" placeholder="Senha">
<button type="button" onclick="togglePassword()">👁️</button>
</div>

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>

<div id="err" class="err"></div>
</div>

<div id="app" class="box" style="display:none">

<h3 id="user"></h3>

<h4>Hoje</h4>
<div id="todayList"></div>

<h4>Amanhã</h4>
<div id="tomorrowList"></div>

<input id="taskInput" placeholder="Nova tarefa">
<button onclick="addToday()">Adicionar hoje</button>
<button onclick="addTomorrow()">Adicionar amanhã</button>

<button onclick="logout()">Sair</button>

</div>

<script>
const sb = supabase.createClient(
'https://awnmxrxkhxepryixhurd.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3bm14cnhraHhlcHJ5aXhodXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzc0MzksImV4cCI6MjA5MDcxMzQzOX0.iajrnVDp05G9MAVWGbIHJEbK7dl5U4uqqry7p7CLg_M'
);

let me = null;

/* 👁️ MOSTRAR SENHA */
function togglePassword(){
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}

/* HASH */
async function hash(p){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* LOGIN */
async function login(){
  const emailInput = document.getElementById("email").value;
  const passInput = document.getElementById("pass").value;

  const h = await hash(passInput);

  const {data} = await sb.from('profiles')
    .select('*')
    .eq('email', emailInput)
    .eq('pass_hash', h)
    .single();

  if(!data){
    document.getElementById("err").innerText = "Erro login";
    return;
  }

  me = data;
  start();
}

/* REGISTER */
async function register(){
  const emailInput = document.getElementById("email").value;
  const passInput = document.getElementById("pass").value;

  await sb.from('profiles').insert({
    id: crypto.randomUUID(),
    email: emailInput,
    pass_hash: await hash(passInput),
    name: emailInput
  });

  alert("Conta criada!");
}

/* START */
function start(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerText = me.email;
  load();
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* DATAS */
function getToday(){
  return new Date().toISOString().split('T')[0];
}

function getTomorrow(){
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

/* LOAD */
async function load(){
  const {data} = await sb.from('tasks').select('*');

  const tdy = data.filter(t=>t.date===getToday());
  const tmr = data.filter(t=>t.date===getTomorrow());

  document.getElementById("todayList").innerHTML =
    tdy.map(t=>`<div class="task">${t.title}</div>`).join('');

  document.getElementById("tomorrowList").innerHTML =
    tmr.map(t=>`<div class="task">${t.title}</div>`).join('');
}

/* ADD */
async function addToday(){
  const val = document.getElementById("taskInput").value;

  await sb.from('tasks').insert({
    title: val,
    date: getToday()
  });

  document.getElementById("taskInput").value="";
  load();
}

async function addTomorrow(){
  const val = document.getElementById("taskInput").value;

  await sb.from('tasks').insert({
    title: val,
    date: getTomorrow()
  });

  document.getElementById("taskInput").value="";
  load();
}
</script>

</body>
</html>
