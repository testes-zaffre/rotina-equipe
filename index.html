<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Equipe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#f7f7f5;color:#1a1a18}

/* LOGIN */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh}
.acard{background:#fff;border-radius:12px;padding:30px;width:100%;max-width:360px}
.field{margin-bottom:12px}
.field input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px}
.btn{width:100%;padding:10px;background:#000;color:#fff;border:none;border-radius:6px;cursor:pointer}
.aerr{color:red;font-size:12px;margin-top:5px}
.toggle{margin-top:10px;font-size:13px;text-align:center;cursor:pointer}

/* APP */
#app{display:none;padding:20px}
.top{display:flex;justify-content:space-between;margin-bottom:20px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="acard">
    <h2>Rotina Equipe</h2>

    <div id="login">
      <div class="field">
        <input type="email" id="l-email" placeholder="E-mail">
      </div>

      <div class="field">
        <div style="display:flex; gap:5px;">
          <input type="password" id="l-pass" placeholder="Senha">
          <button type="button" onclick="togglePassword('l-pass')">👁️</button>
        </div>
      </div>

      <button class="btn" onclick="login()">Entrar</button>
      <div id="l-err" class="aerr"></div>

      <div class="toggle" onclick="showRegister()">Criar conta</div>
    </div>

    <div id="register" style="display:none">
      <div class="field">
        <input type="text" id="r-name" placeholder="Nome">
      </div>

      <div class="field">
        <input type="email" id="r-email" placeholder="E-mail">
      </div>

      <div class="field">
        <div style="display:flex; gap:5px;">
          <input type="password" id="r-pass" placeholder="Senha (mín 6)">
          <button type="button" onclick="togglePassword('r-pass')">👁️</button>
        </div>
      </div>

      <button class="btn" onclick="register()">Criar conta</button>
      <div id="r-err" class="aerr"></div>

      <div class="toggle" onclick="showLogin()">Voltar</div>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top">
    <div id="user"></div>
    <button onclick="logout()">Sair</button>
  </div>

  <h3>Tarefas de Hoje</h3>
  <div id="tasks"></div>

  <div style="margin-top:10px;">
    <input id="newTask" placeholder="Nova tarefa">
    <button onclick="addTask()">Adicionar</button>
  </div>
</div>

<script>
const sb = supabase.createClient(
'https://awnmxrxkhxepryixhurd.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

let user = null;

/* 👁️ MOSTRAR SENHA */
function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

/* TELAS */
function showRegister(){
  document.getElementById("login").style.display="none";
  document.getElementById("register").style.display="block";
}
function showLogin(){
  document.getElementById("login").style.display="block";
  document.getElementById("register").style.display="none";
}

/* HASH */
async function hash(p){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* LOGIN */
async function login(){
  const email = l-email.value;
  const pass = await hash(l-pass.value);

  const {data} = await sb.from('profiles')
    .select('*')
    .eq('email', email)
    .eq('pass_hash', pass)
    .single();

  if(!data){
    l-err.textContent = "Erro login";
    return;
  }

  user = data;
  start();
}

/* REGISTER */
async function register(){
  const name = r-name.value;
  const email = r-email.value;
  const pass = await hash(r-pass.value);

  await sb.from('profiles').insert({
    id: crypto.randomUUID(),
    name,
    email,
    pass_hash: pass
  });

  alert("Conta criada!");
  showLogin();
}

/* APP */
function start(){
  auth.style.display="none";
  app.style.display="block";
  user.innerHTML = user.name;
  loadTasks();
}

function logout(){
  location.reload();
}

/* TASKS */
async function loadTasks(){
  const {data} = await sb.from('tasks').select('*');
  tasks.innerHTML = data.map(t=>`<div>${t.title}</div>`).join('');
}

async function addTask(){
  await sb.from('tasks').insert({
    title: newTask.value
  });
  newTask.value="";
  loadTasks();
}
</script>

</body>
</html>
