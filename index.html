<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Equipe — SGP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--surface:#ffffff;--border:#e5e4df;--border2:#d0cfc9;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --green:#1D9E75;--green-bg:#e8f7f1;
  --red:#E24B4A;--red-bg:#fef0f0;
  --amber:#BA7517;--amber-bg:#fdf3e0;
  --blue:#185FA5;--blue-bg:#e8f0fb;
  --purple:#534AB7;--purple-bg:#efeefc;
  --radius:10px;--radius-sm:7px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:400px}
.auth-logo{font-size:22px;font-weight:600;margin-bottom:4px}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.field input:focus{border-color:#888}
.btn-primary{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:default}
.auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-toggle a{color:var(--text);text-decoration:underline;cursor:pointer}
.auth-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center}

/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:600;font-size:15px;flex:1}
.topbar-user{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.btn-logout{font-size:12px;padding:4px 10px;border:1px solid var(--border2);border-radius:5px;background:none;cursor:pointer;color:var(--text2)}
.btn-logout:hover{background:var(--bg)}

.main{max-width:1100px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px}
.tab{flex:1;padding:8px 12px;border:none;background:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;text-align:center}
.tab.active{background:var(--text);color:#fff}
.tab:hover:not(.active){background:var(--bg)}
.panel{display:none}.panel.active{display:block}

/* LAYOUT DUPLO */
.dual{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.dual{grid-template-columns:1fr}}
.user-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.col-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.col-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.col-name{font-weight:500;font-size:14px;flex:1}
.col-you{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:10px}

/* TASKS */
.section{margin-bottom:18px}
.sec-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.sec-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.badge-fixed{background:var(--blue-bg);color:var(--blue)}
.badge-urgent{background:var(--red-bg);color:var(--red)}
.badge-weekly{background:var(--amber-bg);color:var(--amber)}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);margin-bottom:4px;cursor:pointer;transition:background .1s;user-select:none;position:relative}
.task-item:hover{background:var(--bg)}
.task-item.done{opacity:.45}
.task-item.done .task-text{text-decoration:line-through}
.task-item.urgent-item{border-left:2px solid var(--red)}
.task-item.rolling-item{border-left:2px solid var(--amber)}
.check{width:17px;height:17px;min-width:17px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;flex-shrink:0}
.check.checked{background:var(--green);border-color:var(--green)}
.check.checked::after{content:'';width:4px;height:8px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:block}
.task-text{font-size:13px;color:var(--text);line-height:1.4;flex:1;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.tag-chamados{background:var(--blue-bg);color:var(--blue)}
.tag-slack{background:var(--amber-bg);color:var(--amber)}
.tag-jira{background:#eaf3de;color:#3B6D11}
.tag-cliente{background:#fbeaf0;color:#993556}
.tag-sr{background:var(--purple-bg);color:var(--purple)}
.tag-interno{background:var(--bg);color:var(--text2)}
.tag-urgente{background:var(--red-bg);color:var(--red)}
.roll-btn,.del-btn,.edit-freq-btn{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--border2);background:none;cursor:pointer;color:var(--text2);white-space:nowrap;flex-shrink:0}
.roll-btn:hover{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.del-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.edit-freq-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}

/* ADD */
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input,.add-row select{flex:1;font-size:12px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;min-width:0}
.add-row input:focus,.add-row select:focus{border-color:#888}
.add-row button{font-size:12px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;color:var(--text);white-space:nowrap;flex-shrink:0}
.add-row button:hover{background:var(--text);color:#fff;border-color:var(--text)}

/* PROGRESS */
.progress-wrap{margin-bottom:14px}
.progress-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:var(--text3);margin-bottom:5px}

/* WEEK */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.week-day{text-align:center;padding:8px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface)}
.week-day.today{border-color:var(--green);background:var(--green-bg)}
.week-day-name{font-size:10px;color:var(--text3);margin-bottom:2px}
.week-day-num{font-size:15px;font-weight:500}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.stat-num{font-size:18px;font-weight:600}

/* MONTH */
.month-task{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);margin-bottom:4px;cursor:pointer}
.month-task:hover{background:var(--bg)}
.month-task.done{opacity:.45}
.month-task.done .task-text{text-decoration:line-through}
.month-due{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* NOTES */
.note-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.04em}
textarea{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);resize:vertical;min-height:75px;font-family:inherit;line-height:1.5;outline:none}
textarea:focus{border-color:#888}

/* TEMPLATES MANAGER */
.tmpl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:4px;background:var(--surface)}
.tmpl-text{flex:1;font-size:13px}
.freq-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg)}
.freq-daily{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bg)}
.freq-weekly{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bg)}
.freq-monthly{background:#eaf3de;color:#3B6D11;border-color:#eaf3de}
.divider{height:1px;background:var(--border);margin:16px 0}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:100%;max-width:420px;margin:20px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn-sec{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px}
.btn-sec:hover{background:var(--bg)}
.btn-danger{padding:8px 16px;border:1px solid var(--red);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:13px;color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}

/* LOADER */
.loader{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{font-size:12px;color:var(--text3);padding:8px 10px;font-style:italic}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Rotina Equipe</div>
    <div class="auth-sub">SGP — Gestão de tarefas e rotina</div>
    <div id="auth-form-login">
      <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <div class="auth-err" id="login-err"></div>
      <div class="auth-toggle">Não tem conta? <a onclick="toggleAuth()">Criar conta</a></div>
    </div>
    <div id="auth-form-register" style="display:none">
      <div class="field"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome"></div>
      <div class="field"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="reg-pass" placeholder="mínimo 6 caracteres"></div>
      <button class="btn-primary" onclick="doRegister()">Criar conta</button>
      <div class="auth-err" id="reg-err"></div>
      <div class="auth-toggle">Já tem conta? <a onclick="toggleAuth()">Entrar</a></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Rotina Equipe</div>
    <div class="topbar-user">
      <div class="avatar" id="top-avatar"></div>
      <span id="top-name"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="showTab('daily',this)">Hoje</button>
      <button class="tab" onclick="showTab('week',this)">Semana</button>
      <button class="tab" onclick="showTab('month',this)">Mês</button>
      <button class="tab" onclick="showTab('notes',this)">Retrospectiva</button>
      <button class="tab" onclick="showTab('scrum',this)">Scrum</button>
      <button class="tab" onclick="showTab('templates',this)">Rotinas</button>
    </div>

    <!-- DAILY -->
    <div id="panel-daily" class="panel active">
      <div class="dual" id="daily-dual">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>

    <!-- WEEK -->
    <div id="panel-week" class="panel">
      <div class="week-grid" id="week-grid"></div>
      <div class="dual" id="week-dual">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>

    <!-- MONTH -->
    <div id="panel-month" class="panel">
      <div class="dual" id="month-dual">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>

    <!-- NOTES -->
    <div id="panel-notes" class="panel">
      <div class="dual" id="notes-dual">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>

    <!-- SCRUM -->
    <div id="panel-scrum" class="panel">
      <div id="scrum-content">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>

    <!-- TEMPLATES -->
    <div id="panel-templates" class="panel">
      <div id="templates-content">
        <div class="loader"><span class="spin"></span>Carregando...</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL FREQ -->
<div class="modal-overlay" id="freq-modal">
  <div class="modal">
    <h3>Alterar frequência</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px" id="freq-modal-title"></p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-sec" onclick="setFreq('daily')">📅 Diário — aparece todo dia</button>
      <button class="btn-sec" onclick="setFreq('weekly')">📆 Semanal — aparece uma vez por semana</button>
      <button class="btn-sec" onclick="setFreq('monthly')">🗓 Mensal — aparece uma vez por mês</button>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal('freq-modal')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h3>Remover tarefa obrigatória?</h3>
    <p style="font-size:13px;color:var(--text2)" id="del-modal-title"></p>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal('del-modal')">Cancelar</button>
      <button class="btn-danger" onclick="confirmDelete()">Remover</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://awnmxrxkhxepryixhurd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ulBBN8GXpxCJiMfgnfW8LQ_tB4Z1qT7';
console.log('Supabase URL:', SUPABASE_URL);
console.log('Supabase KEY prefix:', SUPABASE_KEY.slice(0,20)+'...');
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});
console.log('Supabase client created:', !!sb);

let currentUser = null;
let allProfiles = [];
let pendingFreqId = null;
let pendingDelId = null;

// ─── AUTH ───────────────────────────────────────────
function toggleAuth(){
  document.getElementById('auth-form-login').style.display =
    document.getElementById('auth-form-login').style.display==='none'?'block':'none';
  document.getElementById('auth-form-register').style.display =
    document.getElementById('auth-form-register').style.display==='none'?'block':'none';
}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Preencha e-mail e senha.';return;}
  const btn = document.querySelector('#auth-form-login .btn-primary');
  btn.disabled=true; btn.textContent='Entrando...';
  try {
    const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      console.error('Login error:', error);
      errEl.textContent = error.message==='Invalid login credentials'
        ? 'E-mail ou senha incorretos. Se é seu primeiro acesso, clique em Criar conta.'
        : error.message==='Email not confirmed'
        ? 'Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.'
        : 'Erro: '+error.message;
    }
  } catch(e){
    console.error('Login exception:', e);
    errEl.textContent = 'Erro de conexão. Verifique o console (F12).';
  }
  btn.disabled=false; btn.textContent='Entrar';
}

async function doRegister(){
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const errEl = document.getElementById('reg-err');
  errEl.textContent='';
  if(!name){errEl.textContent='Digite seu nome.';return;}
  if(!email){errEl.textContent='Digite seu e-mail.';return;}
  if(pass.length<6){errEl.textContent='Senha precisa ter pelo menos 6 caracteres.';return;}
  const btn = document.querySelector('#auth-form-register .btn-primary');
  btn.disabled=true; btn.textContent='Criando conta...';
  try {
    const {data,error} = await sb.auth.signUp({email,password:pass,options:{data:{name}}});
    if(error){errEl.textContent='Erro: '+error.message;btn.disabled=false;btn.textContent='Criar conta';return;}
    if(data.user){
      await sb.from('profiles').upsert({id:data.user.id,email,name});
      // Se confirmação de email estiver desativada, loga direto
      if(data.session){
        // já logou automaticamente via onAuthStateChange
      } else {
        errEl.style.color='#1D9E75';
        errEl.textContent='Conta criada! Verifique seu e-mail para confirmar antes de entrar.';
      }
    }
  } catch(e){
    console.error('Register error:', e);
    errEl.textContent='Erro de conexão.';
  }
  btn.disabled=false; btn.textContent='Criar conta';
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  currentUser=null;allProfiles=[];
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser = session.user;
    await ensureProfile();
    await loadProfiles();
    initApp();
  }
});

async function ensureProfile(){
  const {data} = await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(!data){
    const name = currentUser.email.split('@')[0];
    await sb.from('profiles').insert({id:currentUser.id,email:currentUser.email,name});
  }
}

async function loadProfiles(){
  const {data} = await sb.from('profiles').select('*');
  allProfiles = data||[];
}

function myProfile(){return allProfiles.find(p=>p.id===currentUser.id)||{name:'Eu',id:currentUser.id}}
function otherProfiles(){return allProfiles.filter(p=>p.id!==currentUser.id)}

// ─── APP INIT ────────────────────────────────────────
function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const me = myProfile();
  document.getElementById('top-name').textContent = me.name;
  document.getElementById('top-avatar').textContent = me.name.slice(0,2).toUpperCase();
  renderCurrentPanel();
}

function showTab(id, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
  renderCurrentPanel();
}

function renderCurrentPanel(){
  const active = document.querySelector('.panel.active');
  if(!active)return;
  const id = active.id.replace('panel-','');
  if(id==='daily') renderDaily();
  if(id==='week') renderWeek();
  if(id==='month') renderMonth();
  if(id==='notes') renderNotes();
  if(id==='scrum') renderScrum();
  if(id==='templates') renderTemplates();
}

// ─── WEEK REF ────────────────────────────────────────
function getWeekRef(){
  const now=new Date();
  const d=new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate()));
  const day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  const y=d.getUTCFullYear();
  const w=Math.ceil((((d-new Date(Date.UTC(y,0,1)))/86400000)+1)/7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}
function getMonthRef(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
}

// ─── COLORS ──────────────────────────────────────────
const COLORS = ['#534AB7','#1D9E75','#185FA5','#BA7517','#993556'];
function userColor(uid){
  const idx = allProfiles.findIndex(p=>p.id===uid);
  return COLORS[idx%COLORS.length]||COLORS[0];
}
function userBg(uid){
  const colors=['#efeefc','#e8f7f1','#e8f0fb','#fdf3e0','#fbeaf0'];
  const idx = allProfiles.findIndex(p=>p.id===uid);
  return colors[idx%colors.length]||colors[0];
}

// ─── TAG HTML ────────────────────────────────────────
function tagHtml(tag){
  if(!tag)return '';
  return `<span class="tag tag-${tag}">${tag}</span>`;
}
function checkHtml(done){
  return `<div class="check${done?' checked':''}"></div>`;
}

// ─── DAILY ───────────────────────────────────────────
async function renderDaily(){
  const wrap = document.getElementById('daily-dual');
  wrap.innerHTML = `<div class="loader"><span class="spin"></span>Carregando...</div>`;

  const today = new Date().toISOString().split('T')[0];
  const wr = getWeekRef();

  // Load templates (daily)
  const {data:tmpls} = await sb.from('task_templates').select('*').eq('frequency','daily').eq('is_active',true);
  // Load tasks for today
  const {data:tasks} = await sb.from('tasks').select('*').in('type',['daily','urgent','tomorrow']).gte('created_at',today+'T00:00:00').order('created_at');

  wrap.innerHTML='';
  const profiles = [myProfile(),...otherProfiles()];
  profiles.forEach(profile=>{
    const isMe = profile.id===currentUser.id;
    const col = document.createElement('div');
    col.className='user-col';

    const myTasks = tasks?.filter(t=>t.assigned_to===profile.id)||[];
    const fixedDone = myTasks.filter(t=>t.is_template&&t.done).length;
    const fixedTotal = tmpls?.length||0;
    const allDone = myTasks.filter(t=>t.done).length;
    const allTotal = myTasks.length;
    const pct = allTotal?Math.round(allDone/allTotal*100):0;

    col.innerHTML=`
      <div class="col-header">
        <div class="col-avatar" style="background:${userBg(profile.id)};color:${userColor(profile.id)}">${profile.name.slice(0,2).toUpperCase()}</div>
        <div class="col-name">${profile.name}</div>
        ${isMe?'<span class="col-you">você</span>':''}
      </div>
      <div class="progress-wrap">
        <div class="progress-text">${allDone} de ${(fixedTotal+allTotal)} tarefas (${pct}%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="section">
        <div class="sec-title">Rotina diária obrigatória <span class="sec-badge badge-fixed">fixo</span></div>
        <div id="fixed-${profile.id}"></div>
      </div>

      <div class="section">
        <div class="sec-title">Urgente / Prioritário <span class="sec-badge badge-urgent">urgente</span></div>
        <div id="urgent-${profile.id}"></div>
        <div class="add-row">
          <input id="inp-urgent-${profile.id}" placeholder="Tarefa urgente..." onkeydown="if(event.key==='Enter')addTask('urgent','${profile.id}')">
          <button onclick="addTask('urgent','${profile.id}')">+ Adicionar</button>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">Tarefas do dia</div>
        <div id="daily-${profile.id}"></div>
        <div class="add-row">
          <input id="inp-daily-${profile.id}" placeholder="Nova tarefa hoje..." onkeydown="if(event.key==='Enter')addTask('daily','${profile.id}')">
          <button onclick="addTask('daily','${profile.id}')">+ Adicionar</button>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section">
        <div class="sec-title">Para amanhã</div>
        <div id="tomorrow-${profile.id}"></div>
        <div class="add-row">
          <input id="inp-tomorrow-${profile.id}" placeholder="Programar para amanhã..." onkeydown="if(event.key==='Enter')addTask('tomorrow','${profile.id}')">
          <button onclick="addTask('tomorrow','${profile.id}')">→ Programar</button>
        </div>
      </div>`;
    wrap.appendChild(col);

    // render fixed
    const fixedEl = document.getElementById('fixed-'+profile.id);
    (tmpls||[]).forEach(tmpl=>{
      const inst = myTasks.find(t=>t.template_id===tmpl.id);
      const done = inst?.done||false;
      const div=document.createElement('div');
      div.className=`task-item${done?' done':''}`;
      div.innerHTML=`${checkHtml(done)}<div style="flex:1"><div class="task-text">${tmpl.title}</div><div class="task-meta">${tagHtml(tmpl.tag)}</div></div>`;
      div.onclick=()=>toggleTemplate(tmpl.id,profile.id,inst?.id,done);
      fixedEl.appendChild(div);
    });

    // render urgent
    const urgentEl=document.getElementById('urgent-'+profile.id);
    const urgents=myTasks.filter(t=>t.type==='urgent');
    if(urgents.length===0) urgentEl.innerHTML='<div class="empty">Nenhuma tarefa urgente</div>';
    urgents.forEach(t=>{
      const div=document.createElement('div');
      div.className=`task-item urgent-item${t.done?' done':''}`;
      div.innerHTML=`${checkHtml(t.done)}<div class="task-text">${t.title}</div>${!t.done?`<button class="roll-btn" onclick="event.stopPropagation();rollTask('${t.id}','${profile.id}')">→ amanhã</button>`:''}`;
      div.onclick=(e)=>{if(!e.target.classList.contains('roll-btn'))toggleTask(t.id,t.done)};
      urgentEl.appendChild(div);
    });

    // render daily
    const dailyEl=document.getElementById('daily-'+profile.id);
    const dailys=myTasks.filter(t=>t.type==='daily');
    if(dailys.length===0) dailyEl.innerHTML='<div class="empty">Adicione tarefas abaixo</div>';
    dailys.forEach(t=>{
      const div=document.createElement('div');
      div.className=`task-item${t.done?' done':''}`;
      div.innerHTML=`${checkHtml(t.done)}<div class="task-text">${t.title}</div>${!t.done?`<button class="roll-btn" onclick="event.stopPropagation();rollTask('${t.id}','${profile.id}')">→ amanhã</button>`:''}`;
      div.onclick=(e)=>{if(!e.target.classList.contains('roll-btn'))toggleTask(t.id,t.done)};
      dailyEl.appendChild(div);
    });

    // render tomorrow
    const tomEl=document.getElementById('tomorrow-'+profile.id);
    const toms=myTasks.filter(t=>t.type==='tomorrow');
    if(toms.length===0) tomEl.innerHTML='<div class="empty">Nenhuma tarefa programada</div>';
    toms.forEach(t=>{
      const div=document.createElement('div');
      div.className=`task-item rolling-item${t.done?' done':''}`;
      div.innerHTML=`${checkHtml(t.done)}<div class="task-text">${t.title}</div>`;
      div.onclick=()=>toggleTask(t.id,t.done);
      tomEl.appendChild(div);
    });
  });
}

async function toggleTemplate(tmplId,userId,instId,done){
  if(instId){
    await sb.from('tasks').update({done:!done,done_at:!done?new Date().toISOString():null}).eq('id',instId);
  } else {
    const tmpl = (await sb.from('task_templates').select('*').eq('id',tmplId).single()).data;
    await sb.from('tasks').insert({title:tmpl.title,type:'daily',assigned_to:userId,created_by:currentUser.id,tag:tmpl.tag,is_template:true,template_id:tmplId,done:true,done_at:new Date().toISOString(),week_ref:getWeekRef()});
  }
  renderDaily();
}

async function toggleTask(id,done){
  await sb.from('tasks').update({done:!done,done_at:!done?new Date().toISOString():null}).eq('id',id);
  renderCurrentPanel();
}

async function addTask(type,userId){
  const inp=document.getElementById(`inp-${type}-${userId}`);
  const text=inp.value.trim();
  if(!text)return;
  await sb.from('tasks').insert({title:text,type,assigned_to:userId,created_by:currentUser.id,week_ref:getWeekRef(),month_ref:getMonthRef()});
  inp.value='';
  renderCurrentPanel();
}

async function rollTask(id,userId){
  await sb.from('tasks').update({done:true,rolled_over:true}).eq('id',id);
  const {data:t}=await sb.from('tasks').select('*').eq('id',id).single();
  await sb.from('tasks').insert({title:t.title,type:'tomorrow',assigned_to:userId,created_by:currentUser.id});
  renderCurrentPanel();
}

// ─── WEEK ─────────────────────────────────────────────
async function renderWeek(){
  // week grid
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  let wgHtml='';
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const isToday=d.toDateString()===today.toDateString();
    wgHtml+=`<div class="week-day${isToday?' today':''}"><div class="week-day-name">${days[d.getDay()]}</div><div class="week-day-num">${d.getDate()}</div></div>`;
  }
  document.getElementById('week-grid').innerHTML=wgHtml;

  const wrap=document.getElementById('week-dual');
  wrap.innerHTML=`<div class="loader"><span class="spin"></span>Carregando...</div>`;

  const wr=getWeekRef();
  const {data:tmpls}=await sb.from('task_templates').select('*').eq('frequency','weekly').eq('is_active',true);
  const {data:tasks}=await sb.from('tasks').select('*').eq('type','weekly').eq('week_ref',wr);

  wrap.innerHTML='';
  const profiles=[myProfile(),...otherProfiles()];
  profiles.forEach(profile=>{
    const isMe=profile.id===currentUser.id;
    const myTasks=tasks?.filter(t=>t.assigned_to===profile.id)||[];
    const col=document.createElement('div');
    col.className='user-col';

    const done=myTasks.filter(t=>t.done).length+(tmpls?.filter(t=>{const inst=myTasks.find(x=>x.template_id===t.id);return inst?.done}).length||0);
    const total=myTasks.length+(tmpls?.length||0);

    col.innerHTML=`
      <div class="col-header">
        <div class="col-avatar" style="background:${userBg(profile.id)};color:${userColor(profile.id)}">${profile.name.slice(0,2).toUpperCase()}</div>
        <div class="col-name">${profile.name}</div>
        ${isMe?'<span class="col-you">você</span>':''}
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">Feitas</div><div class="stat-num">${done}</div></div>
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-num">${total}</div></div>
        <div class="stat-card"><div class="stat-label">%</div><div class="stat-num">${total?Math.round(done/total*100):0}%</div></div>
      </div>
      <div class="section">
        <div class="sec-title">Rotina semanal <span class="sec-badge badge-weekly">fixo</span></div>
        <div id="wfixed-${profile.id}"></div>
      </div>
      <div class="section">
        <div class="sec-title">Tarefas da semana</div>
        <div id="weekly-${profile.id}"></div>
        <div class="add-row">
          <input id="inp-weekly-${profile.id}" placeholder="Tarefa desta semana..." onkeydown="if(event.key==='Enter')addWeeklyTask('${profile.id}')">
          <button onclick="addWeeklyTask('${profile.id}')">+ Adicionar</button>
        </div>
      </div>`;
    wrap.appendChild(col);

    // fixed weekly
    const wfEl=document.getElementById('wfixed-'+profile.id);
    (tmpls||[]).forEach(tmpl=>{
      const inst=myTasks.find(t=>t.template_id===tmpl.id);
      const d=inst?.done||false;
      const div=document.createElement('div');
      div.className=`task-item${d?' done':''}`;
      div.innerHTML=`${checkHtml(d)}<div style="flex:1"><div class="task-text">${tmpl.title}</div><div class="task-meta">${tagHtml(tmpl.tag)}<span class="tag tag-interno">${tmpl.day_of_week||''}</span></div></div>`;
      div.onclick=()=>toggleTemplate(tmpl.id,profile.id,inst?.id,d);
      wfEl.appendChild(div);
    });

    // weekly tasks
    const wEl=document.getElementById('weekly-'+profile.id);
    if(myTasks.filter(t=>!t.is_template).length===0) wEl.innerHTML='<div class="empty">Adicione tarefas abaixo</div>';
    myTasks.filter(t=>!t.is_template).forEach(t=>{
      const div=document.createElement('div');
      div.className=`task-item${t.done?' done':''}`;
      div.innerHTML=`${checkHtml(t.done)}<div class="task-text">${t.title}</div>`;
      div.onclick=()=>toggleTask(t.id,t.done);
      wEl.appendChild(div);
    });
  });
}

  renderMonth();

        '<div style="font-size:13px;padding:9px 11px;background:var(--bg);border-radius:var(--radius-sm)">'+
        (note.jira_done ? 'Horas: OK' : 'Horas: Pendente')+'</div>';

    col.innerHTML=inner;
    wrap.appendChild(col);
  });
}

let noteTimer=null;
async function saveNote(userId){
  clearTimeout(noteTimer);
  noteTimer=setTimeout(async function(){
    var good=document.getElementById('note-good-'+userId);
    var bad=document.getElementById('note-bad-'+userId);
    var next=document.getElementById('note-next-'+userId);
    var keyuser=document.getElementById('note-keyuser-'+userId);
    var jira=document.getElementById('note-jira-'+userId);
    var wr=getWeekRef();
    await sb.from('weekly_notes').upsert({
      user_id:userId,week_ref:wr,
      note_good:good?good.value:'',
      note_bad:bad?bad.value:'',
      note_next:next?next.value:'',
      note_keyuser:keyuser?keyuser.value:'',
      jira_done:jira?jira.checked:false,
      updated_at:new Date().toISOString()
    },{onConflict:'user_id,week_ref'});
  },800);
}

// ─── TEMPLATES ────────────────────────────────────────
async function renderTemplates(){
  const el=document.getElementById('templates-content');
  el.innerHTML=`<div class="loader"><span class="spin"></span>Carregando...</div>`;
  const {data:tmpls}=await sb.from('task_templates').select('*').order('frequency').order('created_at');

  const daily=(tmpls||[]).filter(t=>t.frequency==='daily');
  const weekly=(tmpls||[]).filter(t=>t.frequency==='weekly');
  const monthly=(tmpls||[]).filter(t=>t.frequency==='monthly');

  function tmplHtml(t){
    var freqLabel = t.frequency==='daily'?'Diario':t.frequency==='weekly'?'Semanal':'Mensal';
    var activeLabel = t.is_active?'Desativar':'Ativar';
    var div = document.createElement('div');
    div.className = 'tmpl-item';
    div.style.opacity = t.is_active ? 1 : 0.45;
    div.innerHTML = '<div class="tmpl-text">'+t.title+'</div>'+
      '<span class="freq-pill freq-'+t.frequency+'">'+freqLabel+'</span>'+
      '<button class="del-btn">'+activeLabel+'</button>';
    div.querySelector('.freq-pill').onclick = function(){ openFreqModal(t.id, t.title, t.frequency); };
    div.querySelector('.del-btn').onclick = function(){ openDelModal(t.id, t.title, t.is_active); };
    return div.outerHTML;
  }

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div class="section"><div class="sec-title" style="margin-bottom:10px">Rotina diária <span class="sec-badge badge-fixed">diário</span></div>${daily.map(tmplHtml).join('')}</div>
        <div class="add-row" style="margin-bottom:16px">
          <input id="tmpl-inp-daily" placeholder="Nova tarefa diária obrigatória...">
          <button onclick="addTemplate('daily')">+ Adicionar</button>
        </div>
        <div class="section"><div class="sec-title" style="margin-bottom:10px">Rotina semanal <span class="sec-badge badge-weekly">semanal</span></div>${weekly.map(tmplHtml).join('')}</div>
        <div class="add-row">
          <input id="tmpl-inp-weekly" placeholder="Nova tarefa semanal obrigatória...">
          <input id="tmpl-day-weekly" placeholder="Dia (ex: Sexta)" style="max-width:120px">
          <button onclick="addTemplate('weekly')">+ Adicionar</button>
        </div>
      </div>
      <div>
        <div class="section"><div class="sec-title" style="margin-bottom:10px">Rotina mensal <span class="sec-badge" style="background:#eaf3de;color:#3B6D11">mensal</span></div>${monthly.map(tmplHtml).join('')}</div>
        <div class="add-row">
          <input id="tmpl-inp-monthly" placeholder="Nova obrigação mensal...">
          <input id="tmpl-day-monthly" placeholder="Ex: Dia 25" style="max-width:90px">
          <button onclick="addTemplate('monthly')">+ Adicionar</button>
        </div>
      </div>
    </div>
    <div style="margin-top:20px;padding:12px 14px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px;color:var(--text2)">
      💡 Clique na frequência (Diário/Semanal/Mensal) para mover uma tarefa entre rotinas. Clique em "Desativar" para ocultar sem excluir.
    </div>`;
}

async function addTemplate(freq){
  const inp=document.getElementById('tmpl-inp-'+freq);
  const day=document.getElementById('tmpl-day-'+freq);
  const text=inp.value.trim();
  if(!text)return;
  await sb.from('task_templates').insert({title:text,frequency:freq,day_of_week:day?.value||null,is_active:true,created_by:currentUser.id});
  inp.value='';if(day)day.value='';
  renderTemplates();
}

function openFreqModal(id,title,current){
  pendingFreqId=id;
  document.getElementById('freq-modal-title').textContent=title;
  document.getElementById('freq-modal').classList.add('open');
}
async function setFreq(freq){
  if(!pendingFreqId)return;
  await sb.from('task_templates').update({frequency:freq}).eq('id',pendingFreqId);
  closeModal('freq-modal');
  renderTemplates();
}

function openDelModal(id,title,isActive){
  pendingDelId={id,isActive};
  document.getElementById('del-modal-title').textContent=title;
  document.querySelector('#del-modal h3').textContent=isActive?'Desativar tarefa obrigatória?':'Reativar tarefa obrigatória?';
  document.querySelector('#del-modal .btn-danger').textContent=isActive?'Desativar':'Reativar';
  document.getElementById('del-modal').classList.add('open');
}
async function confirmDelete(){
  if(!pendingDelId)return;
  await sb.from('task_templates').update({is_active:!pendingDelId.isActive}).eq('id',pendingDelId.id);
  closeModal('del-modal');
  renderTemplates();
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  pendingFreqId=null;pendingDelId=null;
}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));
</script>
</body>
</html>
