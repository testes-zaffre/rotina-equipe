<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Equipe</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px}
.task{padding:8px;border-bottom:1px solid #ddd}
.err{color:red}
</style>

</head>

<body>

<div id="auth" class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">

<div style="display:flex; gap:5px;">
<input type="password" id="pass" placeholder="Senha">
<button onclick="togglePassword()">👁️</button>
</div>

<button onclick="login()">Entrar</button>

<div id="err" class="err"></div>
</div>

<div id="app" class="box" style="display:none">

<h3 id="user"></h3>

<h4>Tarefas</h4>
<div id="list"></div>

<input id="taskInput" placeholder="Nova tarefa">
<button onclick="addTask()">Adicionar</button>

<button onclick="logout()">Sair</button>

</div>

<script>
let tasks = [];

function togglePassword(){
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(email === "teste@teste.com" && pass === "123"){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText = email;
  } else {
    document.getElementById("err").innerText = "Login inválido";
  }
}

function logout(){
  location.reload();
}

function addTask(){
  const val = document.getElementById("taskInput").value;
  tasks.push(val);
  document.getElementById("taskInput").value="";
  render();
}

function render(){
  document.getElementById("list").innerHTML =
    tasks.map(t=>`<div class="task">${t}</div>`).join('');
}
</script>

</body>
</html>
